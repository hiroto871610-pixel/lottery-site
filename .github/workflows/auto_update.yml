name: Lottery Auto Update

# 毎日 夜21:30 (日本時間) に自動実行する設定
on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch: # 手動でボタンを押して実行する機能も残す

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 宝くじ全データ＆トップページの自動更新スクリプトを実行
        run: |
          python update_loto7.py
          python update_loto6.py
          python update_numbers.py
          python update_index.py

      - name: 更新されたデータをGitHubに自動保存（コミット＆プッシュ）
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新: 最新の宝くじデータとAI予想を反映" && git push)
