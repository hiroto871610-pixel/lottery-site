name: Weekly Lottery Update

on:
  schedule:
    # 毎週金曜日の日本時間 21:05頃に実行（世界標準時の12:05）
    - cron: '5 12 * * 5'
  workflow_dispatch: # 手動で実行ボタンを押せるようにもします

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pythonプログラムを実行（予想更新）
        run: python update_loto7.py

      - name: 更新されたファイルをGitHubに保存
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto Update: Lottery Prediction" || exit 0
          git push