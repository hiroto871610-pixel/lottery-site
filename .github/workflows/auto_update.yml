name: Weekly Lottery Update

on:
  schedule:
    # 毎週金曜日の日本時間 21:05頃に実行
    - cron: '5 12 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ロト7の予想を更新
        run: python update_loto7.py

      - name: ロト6の予想を更新
        run: python update_loto6.py

      - name: ナンバーズの予想を更新
        run: python update_numbers.py

      - name: 更新された全ファイルをGitHubに保存
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto Update: All Lottery Predictions" || exit 0
          git push