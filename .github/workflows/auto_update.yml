name: Lottery Auto Update

# 毎日 朝8:30 と 夜21:30 (日本時間) に自動実行する設定
on:
  schedule:
    - cron: '30 23 * * *' # 毎日 朝8:30 (日本時間) ← 追加：朝の予告配信用
    - cron: '30 12 * * *' # 毎日 夜21:30 (日本時間) ← 元の設定：夜の結果速報用
  workflow_dispatch: # 手動でボタンを押して実行する機能も残す

jobs:
  update-data:
    runs-on: ubuntu-latest

# ▼▼▼ 修正①：GitHubにファイルを保存(Push)する権限を与える ▼▼▼
    permissions:
      contents: write
    # ▲▲▲ 👆ここまで追加👆 ▲▲▲

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 tweepy python-dotenv Pillow cloudinary moviepy numpy

      - name: 宝くじ全データ＆トップページの自動更新スクリプトを実行
        # ▼▼▼ ここを追加！GitHubに登録した鍵(Secrets)をPythonに渡す ▼▼▼
        env: 
          # ▼▼▼ 修正②：クラウドサーバーの時間を「日本時間」に設定する ▼▼▼
          TZ: 'Asia/Tokyo'
          # ▲▲▲ 👆ここまで追加👆 ▲▲▲
          # ▼▼▼ 追加 ▼▼▼
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
          JSONBIN_BIN_ID_LOTO7: ${{ secrets.JSONBIN_BIN_ID_LOTO7 }}
          JSONBIN_BIN_ID_NUMBERS: ${{ secrets.JSONBIN_BIN_ID_NUMBERS }}
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_API_KEY }}
          # ▲▲▲ 追加 ▲▲▲
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        # ▲▲▲ ここまで追加 ▲▲▲
        # ▼▼▼ ★動画機能用に追加（Cloudinaryの鍵） ▼▼▼
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # ▲▲▲ ここまで追加 ▲▲▲
        
        run: |
          python update_loto7.py
          python update_loto6.py
          python update_numbers.py
          python update_index.py
          python update_jumbo.py

      - name: 更新されたデータをGitHubに自動保存（コミット＆プッシュ）
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新: 最新の宝くじデータとAI予想を反映" && git push)

          # ▼▼▼ 一番最後にこのブロックを丸ごと追加！ ▼▼▼
      - name: Auto-Update Threads Token in Secrets
        if: env.NEW_THREADS_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set THREADS_ACCESS_TOKEN --body "${{ env.NEW_THREADS_TOKEN }}" --repo ${{ github.repository }}
          echo "✅ GitHub SecretsのThreadsトークンを最新に自動アップデートしました！"
      # ▲▲▲ ここまで ▲▲▲