name: Horoscope Auto Update

# 毎日 朝6:00 (日本時間) に占いだけを単独で自動実行する設定
on:
  schedule:
    - cron: '0 21 * * *' # 日本時間の朝6:00 (UTCの21:00)
  workflow_dispatch: # 手動実行ボタン

jobs:
  update-horoscope:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: リポジトリのコードを取得
        uses: actions/checkout@v3

      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 必要なライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv Pillow

      - name: 占いページの自動更新スクリプトを実行
        env: 
          TZ: 'Asia/Tokyo'
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          python update_horoscope.py

      - name: 更新された占いデータをGitHubに自動保存
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔮 自動更新: 本日の星座占いとタロットを反映" && git push)